# Render Blueprint — provisions the web service + PostgreSQL together.
# Push this repo to GitHub, then in Render: New > Blueprint > pick this repo.
services:
  - type: web
    name: virtualedge
    runtime: node
    plan: starter                  # paid (~$7/mo): always-on, no cold-start sleep
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: virtualedge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong random secret
      - key: ADMIN_PASSCODE
        sync: false                  # set this yourself in the dashboard
      - key: ANTHROPIC_API_KEY
        sync: false                  # set this yourself in the dashboard (screenshot scanning, Claude vision)
      - key: RESEND_API_KEY
        sync: false                  # set this yourself (email confirmations); blank = emails off
      - key: MAIL_FROM
        sync: false                  # e.g. "VirtualEdge <noreply@yourdomain.com>"
      - key: DATABASE_SSL
        value: "on"

databases:
  - name: virtualedge-db
    plan: basic-256mb              # paid (~$6/mo): persistent, daily backups, no 30-day expiry
    databaseName: virtualedge
    user: virtualedge
